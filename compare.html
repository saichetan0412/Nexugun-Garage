<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Compare Cars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="compare-styles.css" />
</head>
<body>
  <h1>Car Comparison</h1>
  <div class="compare-controls">
    <div class="advanced-sharing-title">Advanced Sharing</div>
    <label class="differences-toggle">
      <input id="differencesOnlyToggle" type="checkbox" />
      Show differences only
    </label>
    <div class="compare-action-buttons">
      <button id="copyShareLinkBtn" type="button">Copy Share Link</button>
      <button id="exportImageBtn" type="button">Export Image</button>
      <button id="exportPdfBtn" type="button">Export PDF</button>
    </div>
  </div>
  <div id="compareTable"></div>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="compare.js"></script>
</body>
</html>
