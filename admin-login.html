<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexugun Garage Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin-login.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1>Admin Login</h1>
      <p>Sign in to manage Nexugun Garage inventory and specs.</p>
      <form id="adminLoginForm" class="login-form">
        <label>
          Username
          <input id="username" name="username" type="text" required autocomplete="username" />
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" required autocomplete="current-password" />
        </label>
        <button type="submit" id="loginBtn">Login</button>
      </form>
      <p id="loginStatus" class="login-status"></p>
      <a href="index.html" class="back-link">Back to Website</a>
    </section>
  </main>
  <script src="admin-login.js"></script>
</body>
</html>
